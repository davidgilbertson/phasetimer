<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Monochrome filled silhouette for Safari pinned tabs -->
  <g fill="#000">
    <!-- Body (circle) -->
    <circle cx="32" cy="36" r="22" />
    <!-- Top button -->
    <rect x="28" y="6" width="8" height="8" rx="2" />
    <!-- Side pusher -->
    <rect x="50" y="20" width="6" height="10" rx="2" />
    <!-- Hands (thick rectangles) -->
    <rect x="30" y="20" width="4" height="18" />
    <rect x="32" y="36" width="14" height="4" transform="rotate(35 32 36)" />
  </g>
</svg>

