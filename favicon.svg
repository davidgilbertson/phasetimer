<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Stopwatch Icon</title>
  <defs>
    <style>
      .stroke { fill: none; stroke: #2563eb; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .fill { fill: #2563eb; }
    </style>
  </defs>
  <!-- Top button -->
  <rect x="28" y="6" width="8" height="8" rx="2" class="fill"/>
  <!-- Body -->
  <circle cx="32" cy="36" r="22" class="stroke"/>
  <!-- Hands -->
  <line x1="32" y1="36" x2="32" y2="20" class="stroke"/>
  <line x1="32" y1="36" x2="44" y2="44" class="stroke"/>
  <!-- Side pusher -->
  <rect x="50" y="20" width="6" height="10" rx="2" class="fill"/>
</svg>
